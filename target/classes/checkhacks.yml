default-check-hacks:
  - meteor-client
  - liquidbounce
  - freecam
  - wurst
  - xray-fabric
  - chestesp
  - killaura-fabric
  - autofish
  - lumina
  - autoswitch
  - bleachhack
  - aristois
  - coffee
  - world-downloader
  - autoclicker-fabric
  - antiafk
  - auto-clicker-mc
  - seedcrackerx

auto-check-on-join:
  enabled: false
  only-first-join: false
  hacks:
    - meteor-client
    - liquidbounce
    - freecam
    - wurst
    - bleachhack
    - aristois
    - world-downloader
    - autoclicker-fabric
    - antiafk
    - seedcrackerx

detect-flag:
  enabled: false
  anticheats:
    grim: true
    vulcan: true
    spartan: true
  cooldown-hours: 24
  hacks:
    - meteor-client
    - liquidbounce
    - freecam
    - wurst
    - bleachhack
    - aristois
    - world-downloader
    - autoclicker-fabric
    - antiafk
    - baritone
    - seedcrackerx

command-if-positive:
  enabled: true
  command: "ban %player% %message% %duration%" # Duration won't work for servers without essentials or other ban plugins with time compatibility!

command-if-protected:
  enabled: true
  command: "kick %player% Unexpected-Client-Response"

command-if-clean:
  enabled: false
  command: "give %player% diamond 1"

timeout-ticks: 200
between-sign-ticks: 3